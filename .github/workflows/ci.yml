name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Lint, type check, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Lint
        run: uv run --locked ruff check .

      - name: Type check
        run: uv run --locked --extra dev pyright

      - name: Test
        run: uv run --locked --extra dev pytest

      - name: Build package
        run: uv build --out-dir dist --clear
