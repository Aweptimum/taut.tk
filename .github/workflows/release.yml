name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  checks:
    name: Lint, type check, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Lint
        run: uv run --locked ruff check .

      - name: Type check
        run: uv run --locked --extra dev pyright

      - name: Test
        run: uv run --locked --extra dev pytest

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs:
      - checks

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Check release tag
        run: |
          version="$(uv version --short)"
          test "${GITHUB_REF_NAME}" = "$version" || test "${GITHUB_REF_NAME}" = "v$version"

      - name: Build package
        run: uv build --out-dir dist --clear

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build
    environment:
      name: pypi
      url: https://pypi.org/p/taut.tk
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
